    <!-- Dograh WebSocket rewrite: must run BEFORE any other script.
         Vercel rewrites proxy HTTP to api.dograh.com but can't handle wss://.
         This redirects WebSocket connections directly to api.dograh.com. -->
    <script>
      (function(){
        var R=window.WebSocket;
        window.WebSocket=new Proxy(R,{
          construct:function(T,A){
            if(typeof A[0]==="string"&&A[0].indexOf("tevrixai.com/dograh-api")!==-1){
              A[0]=A[0].replace("wss://tevrixai.com/dograh-api","wss://api.dograh.com");
            }
            return new T(A[0],A[1]);
          }
        });
      })();
    </script>

    <!-- SSR visibility fix: targets only elements framer-motion touches (those
         with inline style attrs). Avoids the #root * wildcard which caused
         massive style recalculation (5s+). Removed by main.jsx on interaction. -->
    <style id="fm-ssr">
      #root [style*="opacity"]{opacity:1!important}
      #root [style*="transform"]{transform:none!important}
      #root [style*="visibility"]{visibility:visible!important}
      #root section,#root [data-framer-name]{opacity:1!important;transform:none!important}
    </style>
    <noscript><style>#root section,#root div,#root p,#root h1,#root h2,#root h3,#root span{opacity:1!important;transform:none!important}</style></noscript>
